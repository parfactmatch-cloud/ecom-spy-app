<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Niche Finder Pro</title>
    <!-- Telegram Web App Script Link -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #17212b; /* Telegram Dark Theme Color */
            color: white;
            text-align: center;
            padding: 20px;
        }
        .card {
            background: #242f3d;
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .btn {
            background: #2481cc;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h2>🕵️‍♂️ Niche Finder & Ecom Spy Pro</h2>
    <p>Welcome to your mobile-built Telegram Mini App!</p>

    <div class="card">
        <h3>🔥 Trending Product (Test Data)</h3>
        <p><strong>Product:</strong> Ergonomic Memory Foam Pillow</p>
        <p><strong>Platform:</strong> TikTok Ads (Active 9 Days)</p>
        <button class="btn" onclick="showAlert()">View Insights</button>
    </div>

    <script>
        // Telegram Web App ko initialize karna
        const tg = window.Telegram.WebApp;
        tg.ready(); // Telegram ko batata hai ki app load ho gaya hai

        function showAlert() {
            tg.showAlert("Data scraping engine backend se connect ho raha hai... Wait karo!");
        }
    </script>
</body>
</html>
