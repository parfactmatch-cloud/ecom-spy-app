<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcomSpy Pro - Freemium Engine</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            background-color: #0e1621;
            color: #e4ecf5;
            text-align: center;
            padding: 12px;
            margin: 0;
            min-height: 98vh;
        }
        .header-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 8px;
            border-bottom: 1px solid #242f3d;
            margin-bottom: 10px;
        }
        .header-title { font-size: 18px; color: #ffffff; font-weight: bold; }
        .role-badge {
            font-size: 10px;
            font-weight: bold;
            padding: 3px 8px;
            border-radius: 12px;
            text-transform: uppercase;
        }
        .badge-free { background: #7f97ab; color: #0e1621; }
        .badge-pro { background: #f1c40f; color: #0e1621; }
        .badge-admin { background: #9b59b6; color: white; }

        .tabs-container {
            display: flex;
            background: #17212b;
            border-radius: 25px;
            padding: 4px;
            margin-bottom: 15px;
            border: 1px solid #242f3d;
        }
        .tab-btn {
            background: transparent;
            color: #7f97ab;
            border: none;
            padding: 8px 4px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 20px;
            width: 33.33%;
        }
        .tab-btn.active {
            background: #2481cc;
            color: white;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .search-box {
            background: #17212b;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #242f3d;
            margin-bottom: 15px;
        }
        input[type="text"] {
            width: 90%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #2b394a;
            background: #0e1621;
            color: white;
            outline: none;
            font-size: 13px;
        }
        .btn-spy {
            background: linear-gradient(135deg, #e67e22, #d35400);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
            width: 96%;
            margin-top: 8px;
            cursor: pointer;
        }
        
        /* Freemium Blurred Locked UI Card Pattern */
        .premium-locked-blur {
            position: relative;
            filter: blur(4px);
            pointer-events: none;
            user-select: none;
        }
        .lock-overlay-box {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(23, 33, 43, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            border-radius: 10px;
            border: 1px dashed #e67e22;
            padding: 20px;
        }

        .ad-card {
            background: #17212b;
            border-radius: 10px;
            padding: 12px;
            margin: 12px 0;
            text-align: left;
            border: 1px solid #242f3d;
            position: relative;
        }
        .ad-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .ad-title { font-size: 14px; font-weight: bold; color: #ffffff; }
        .ad-metrics { font-size: 12px; color: #a2b6c7; line-height: 1.5; }
        .ai-writer-box {
            background: #0e1621;
            border: 1px dashed #2481cc;
            border-radius: 6px;
            padding: 8px; margin-top: 10px;
            font-size: 12px; color: #52b1ff; display: none;
        }
        .ad-actions { display: flex; justify-content: space-between; margin-top: 8px; border-top: 1px solid #242f3d; padding-top: 8px; gap: 5px; }
        .btn-action-small {
            background: #242f3d; color: #52b1ff; border: 1px solid #2b394a;
            padding: 5px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; cursor: pointer; text-decoration: none;
        }
        .btn-ai-spark { background: #27ae60; color: white; border: none; }
        .tag-small { padding: 2px 6px; border-radius: 3px; font-size: 10px; font-weight: bold; color: white; }

        /* Analytics Panels */
        .analytics-card { background: #17212b; border-radius: 12px; padding: 15px; text-align: left; border: 1px solid #2b394a; }
        .analytics-title { font-size: 14px; color: #8da4b9; border-bottom: 1px solid #242f3d; padding-bottom: 6px; margin-bottom: 10px; font-weight: bold; }
        .metric-row { display: flex; justify-content: space-between; margin: 6px 0; font-size: 13px; }
        .metric-val { color: #52b1ff; font-weight: bold; }
        .badge-profit { background: #27ae60; color: white; padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .chart-box { margin-top: 15px; background: #0e1621; padding: 10px; border-radius: 8px; max-height: 200px; display: flex; justify-content: center; }
    </style>
</head>
<body>

    <div class="header-panel">
        <span class="header-title">🕵️‍♂️ EcomSpy Pro</span>
        <span id="user-role-badge" class="role-badge badge-free">Free User</span>
    </div>

    <div class="tabs-container">
        <button class="tab-btn active" onclick="switchTab('store-spy-tab', this)">🏪 Store Spy</button>
        <button class="tab-btn" onclick="switchTab('viral-ads-tab', this)">📺 Viral Ads AI</button>
        <button class="tab-btn" onclick="switchTab('pinterest-tab', this)">📌 Pinterest Trends</button>
    </div>

    <!-- TAB 1: STORE SPY (FREE MODULE) -->
    <div id="store-spy-tab" class="tab-content active">
        <div class="search-box">
            <input type="text" id="store-url" placeholder="Paste Shopify URL here...">
            <button class="btn-spy" onclick="spyStoreAnalytics()">⚡ Deep Analyze Ecosystem</button>
        </div>
        <div id="spy-results">
            <p style="text-align:center; color:#7f97ab; font-size: 13px;">Free Status Activation: Basic analytics open.</p>
        </div>
    </div>

    <!-- TAB 2: VIRAL ADS (FREEMIUM PROTECTED) -->
    <div id="viral-ads-tab" class="tab-content">
        <div class="search-box" style="border-color: #2481cc;">
            <input type="text" id="ads-search-input" onkeyup="searchAdsEngine()" placeholder="🔍 Search FB / TikTok ads cluster...">
        </div>
        <div style="position:relative; min-height: 200px;">
            <div id="premium-lock-ads" class="lock-overlay-box" style="display:none;">
                <h4 style="color:#f1c40f; margin:0 0 8px 0;">🔒 PRO BLOCK SYSTEM</h4>
                <p style="font-size:11px; color:#a2b6c7; margin:0 0 12px 0; text-align:center;">Viral Spy database access requires premium plan vectors subscription module.</p>
                <button class="btn-action-small" style="background:#f39c12; color:#0e1621;" onclick="sendPurchaseIntentToChat()">💎 Buy Pro Via Chat (50 Stars)</button>
            </div>
            <div id="dynamic-ads-container"></div>
        </div>
    </div>

    <!-- TAB 3: PINTEREST TRENDS (FREEMIUM PROTECTED) -->
    <div id="pinterest-tab" class="tab-content">
        <div class="search-box" style="border-color: #bd081c;">
            <input type="text" id="pin-search-input" onkeyup="searchPinterestEngine()" placeholder="📌 Search Pinterest viral trends & keywords...">
        </div>
        <div style="position:relative; min-height: 200px;">
            <div id="premium-lock-pin" class="lock-overlay-box" style="display:none;">
                <h4 style="color:#f1c40f; margin:0 0 8px 0;">🔒 TREND MATRIX LOCKED</h4>
                <p style="font-size:11px; color:#a2b6c7; margin:0 0 12px 0; text-align:center;">Pinterest corporate research data index parameters require an active membership pass.</p>
                <button class="btn-action-small" style="background:#f39c12; color:#0e1621;" onclick="sendPurchaseIntentToChat()">💎 Unlock Pro Layer</button>
            </div>
            <div id="pinterest-container"></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // PARSE USER ID AND CONFIG FOR PRIVILEGES ROLE ASSIGNMENTS
        let currentUserTelegramId = tg.initDataUnsafe?.user?.id || "test_user";
        let userRole = "free"; // Default role initialization fallback matrix
        
        // ADMIN HARDCODED PROFILE IDENTIFICATION BYPASSER LOCK HOOK
        // REPLACE WITH YOUR REAL TELEGRAM NUMBER ID
        const MASTER_ADMIN_ID = 123456789; 

        if(parseInt(currentUserTelegramId) === MASTER_ADMIN_ID) {
            userRole = "admin";
        }

        let adsDataGlobal = [];
        let myPieChart = null; 

        function applyRoleUIConfig() {
            const badge = document.getElementById('user-role-badge');
            badge.className = "role-badge " + (userRole === 'admin' ? 'badge-admin' : (userRole === 'pro' ? 'badge-pro' : 'badge-free'));
            badge.innerText = userRole + " Mode";

            // If user has free restriction profiles, lock premium overlays
            if(userRole === 'free') {
                document.getElementById('premium-lock-ads').style.display = 'flex';
                document.getElementById('premium-lock-pin').style.display = 'flex';
                document.getElementById('dynamic-ads-container').classList.add('premium-locked-blur');
                document.getElementById('pinterest-container').classList.add('premium-locked-blur');
            } else {
                document.getElementById('premium-lock-ads').style.display = 'none';
                document.getElementById('premium-lock-pin').style.display = 'none';
                document.getElementById('dynamic-ads-container').classList.remove('premium-locked-blur');
                document.getElementById('pinterest-container').classList.remove('premium-locked-blur');
            }
        }

        async function prefetchWarehouseData() {
            try {
                const response = await fetch('ads-data.json?v=' + new Date().getTime());
                adsDataGlobal = await response.json();
                
                // Fetch user specific payment role database lookup configuration mapping logic if needed
                applyRoleUIConfig();
                
                renderGrid('dynamic-ads-container', adsDataGlobal.filter(a => !a.platform.includes("Pinterest")), "ads");
                renderGrid('pinterest-container', adsDataGlobal.filter(a => a.platform.includes("Pinterest")), "pin");
            } catch (error) { console.log("Database fetch mismatch."); }
        }
        prefetchWarehouseData();

        function switchTab(tabId, buttonElement) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            buttonElement.classList.add('active');
        }

        function sendPurchaseIntentToChat() {
            // Signal sent back down securely into bot conversation feed interface without leaving window frame
            tg.sendData(JSON.stringify({action: "checkout_stars_intent", uid: currentUserTelegramId}));
            tg.close(); // Closes screen framework context smoothly reverting to chat dashboard panel
        }

        function renderGrid(containerId, dataArray, typeCode) {
            const container = document.getElementById(containerId);
            container.innerHTML = ''; 
            dataArray.forEach((ad, idx) => {
                const card = document.createElement('div');
                card.className = 'ad-card';
                card.style.borderLeft = `4px solid ${ad.color}`;
                let idString = `${typeCode}-ai-${idx}`;
                
                let metricsHtml = ad.platform.includes("Pinterest") ? `
                    📈 <strong>Search Trend:</strong> ${ad.trend_growth}<br>
                    📊 <strong>Search Volume:</strong> ${ad.engagement}<br>
                    🏷️ <strong>Trending Keywords:</strong> <span style="color:#f1c40f;">${ad.related_keywords}</span>
                ` : `
                    📢 <strong>Source Feed:</strong> ${ad.platform}<br>
                    📊 <strong>Performance:</strong> ${ad.engagement}<br>
                    💰 <strong>Target Margin:</strong> ${ad.roas}
                `;

                card.innerHTML = `
                    <div class="ad-top"><span class="ad-title">${ad.title}</span><span class="tag-small" style="background:${ad.color};">${ad.tag}</span></div>
                    <div class="ad-body-wrapper"><div class="ad-metrics">${metricsHtml}</div></div>
                    <div class="ai-writer-box" id="${idString}">🤖 **AI AD COPY:**\n👉 "Viral ${ad.title} taking over! 🚀 50% OFF + Free Shipping Today! Link in Bio."</div>
                    <div class="ad-actions">
                        <button class="btn-action-small" onclick="copyLink('${ad.store}')">📋 Copy Domain</button>
                        <button class="btn-action-small btn-ai-spark" onclick="toggleAiWriter('${idString}')">🪄 AI Copywriter</button>
                        <a href="${ad.link}" target="_blank" class="btn-action-small">📺 View</a>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function toggleAiWriter(boxId) {
            if(userRole === 'free') return alert("Feature locked in free tiers.");
            const el = document.getElementById(boxId);
            el.style.display = (el.style.display === 'block') ? 'none' : 'block';
        }

        function searchAdsEngine() {
            const query = document.getElementById('ads-search-input').value.toLowerCase().trim();
            renderGrid('dynamic-ads-container', adsDataGlobal.filter(a => !a.platform.includes("Pinterest") && a.title.toLowerCase().includes(query)), "ads");
        }

        function searchPinterestEngine() {
            const query = document.getElementById('pin-search-input').value.toLowerCase().trim();
            renderGrid('pinterest-container', adsDataGlobal.filter(a => a.platform.includes("Pinterest") && a.title.toLowerCase().includes(query)), "pin");
        }

        function copyLink(linkText) { navigator.clipboard.writeText(linkText).then(() => alert("Copied!")); }

        function spyStoreAnalytics() {
            const inputUrl = document.getElementById('store-url').value.trim();
            const resultsContainer = document.getElementById('spy-results');
            if(!inputUrl) return alert("Enter domain!");

            resultsContainer.innerHTML = '<p style="font-size:12px; color:#2481cc;">Parsing matrix mapping parameters...</p>';
            let matchedAd = adsDataGlobal.find(ad => inputUrl.includes(ad.store) || ad.store.includes(inputUrl));
            
            let traffic = matchedAd ? matchedAd.engagement.split('|')[0].trim() : "25K views";
            let topProduct = matchedAd ? matchedAd.title.replace(/[^\w\s]/gi, '') : "Trending Niche Item";
            let status = matchedAd ? matchedAd.tag : "Verified Scalable (2.6x ROAS)";

            setTimeout(() => {
                resultsContainer.innerHTML = `
                    <div class="analytics-card">
                        <div class="analytics-title">🌐 REAL MATRIX: ${inputUrl}</div>
                        <div class="metric-row"><span>📈 Reach:</span><span class="metric-val">${traffic}</span></div>
                        <div class="metric-row"><span>🏆 Hero Item:</span><span class="metric-val" style="color:#e67e22;">${topProduct}</span></div>
                        <div class="metric-row"><span>💰 Traffic Status:</span><span class="badge-profit" style="background:#2481cc;">${status}</span></div>
                        <div class="chart-box"><canvas id="trafficPieChart"></canvas></div>
                    </div>
                `;
                const ctx = document.getElementById('trafficPieChart').getContext('2d');
                if (myPieChart) myPieChart.destroy();
                myPieChart = new Chart(ctx, {
                    type: 'pie',
                    data: {
                        labels: ['Facebook', 'TikTok', 'Pinterest', 'Google'],
                        datasets: [{ data: [35, 30, 20, 15], backgroundColor: ['#3b5998', '#ff0050', '#bd081c', '#27ae60'], borderWidth: 1, borderColor: '#17212b' }]
                    },
                    options: { responsive: true, plugins: { legend: { display: true, position: 'right' } } }
                });
            }, 900);
        }
    </script>
</body>
</html>
