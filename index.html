<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Niche Finder Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #17212b;
            color: white;
            text-align: center;
            padding: 15px;
            margin: 0;
        }
        .header {
            padding: 10px;
            margin-bottom: 15px;
        }
        .card {
            background: #242f3d;
            border-radius: 12px;
            padding: 15px;
            margin: 15px 0;
            text-align: left;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border-left: 5px solid #2481cc;
        }
        .product-title {
            font-size: 18px;
            font-weight: bold;
            color: #52b1ff;
            margin: 0 0 8px 0;
        }
        .product-info {
            font-size: 14px;
            color: #b1c7dc;
            margin: 4px 0;
        }
        .tag {
            display: inline-block;
            background: #e67e22;
            color: white;
            padding: 3px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            margin-top: 8px;
        }
        .btn-refresh {
            background: #2481cc;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            width: 100%;
            margin-top: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header">
        <h2>🕵️‍♂️ Ecom Spy & Niche Finder</h2>
        <p style="color: #8da4b9;">Live Trending Dropshipping Products</p>
    </div>

    <div id="products-container">
        <!-- Data dynamic yahan load hoga -->
    </div>

    <button class="btn-refresh" onclick="loadLocalTrends()">🔄 Refresh Spy Feed</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Local dynamic data bank (Network secure array)
        const spyDatabase = [
            { title: "Ergonomic Memory Foam Armrest Pads", type: "Office & Home Gadgets", profit: "High (65% Margin)", tag: "Viral Trend 🔥" },
            { title: "Anti-Barking Ultrasonic Dog Trainer", type: "Pet Care / Problem Solver", profit: "Very High Demand", tag: "Rising Micro-Niche 📈" },
            { title: "Portable Mini Neck Fan (Rechargeable)", type: "Summer Hot Selling Essentials", profit: "Massive Volume", tag: "Viral Trend 🔥" }
        ];

        function loadLocalTrends() {
            const container = document.getElementById('products-container');
            container.innerHTML = '<p style="text-align:center; color:#b1c7dc;">Scanning Dropship Data Ecosystem...</p>';
            
            // Chhota sa artificial delay taaki real feel aaye data search hone ka
            setTimeout(() => {
                container.innerHTML = ''; 
                
                spyDatabase.forEach(product => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div class="product-title">${product.title}</div>
                        <div class="product-info"><strong>Niche Category:</strong> ${product.type}</div>
                        <div class="product-info"><strong>Potential:</strong> ${product.profit}</div>
                        <div class="tag">${product.tag}</div>
                    `;
                    container.appendChild(card);
                });
            }, 800); // 0.8 second ka scan effect
        }

        window.onload = loadLocalTrends;
    </script>
</body>
</html>
