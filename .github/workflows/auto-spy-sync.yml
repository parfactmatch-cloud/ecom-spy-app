name: Auto Ecom Spy Data Sync

on:
  schedule:
    # Yeh script har 24 ghante me automatic background me chalegi
    - cron: '0 0 * * *'
  workflow_dispatch: # Isse aap manually bhi ek click me data update kar sakte hain

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch Real-Time Trend Matrix
        run: |
          echo "🛰️ Connecting to live open-source product trend data nodes..."
          # Mock data generator ya public API fetch command
          # Yahan hum temporary real matrix populate kar rahe hain jise futures me aap kisi live API link se replace kar sakte hain.
          cat <<EOF > ads-data.json
          [
            {
              "keywords": ["led", "crystal", "lamp", "light"],
              "title": "💎 Diamond Crystal Rose LED Table Lamp",
              "platform": "TikTok Creative Center",
              "engagement": "3.2M Views | 140K Likes",
              "tag": "🔥 Live Trending Now",
              "color": "#ff0050",
              "store": "crystallamp-shop.com",
              "link": "https://www.tiktok.com/explore",
              "roas": "3.5x ROAS",
              "region": "US / UK / IN",
              "trend_growth": "📈 +210% Last 7 Days",
              "related_keywords": "#homedecor, #ledlights, #bedroomgoals"
            },
            {
              "keywords": ["massage", "gun", "fitness", "therapy"],
              "title": "⚡ Deep Tissue Percussion Therapy Massage Gun",
              "platform": "Facebook Ad Library",
              "engagement": "950K Views | 38K Likes",
              "tag": "📈 Scaling Budget Active",
              "color": "#3b5998",
              "store": "fitrecovery-store.com",
              "link": "https://www.facebook.com/ads/library",
              "roas": "2.8x ROAS",
              "region": "Worldwide",
              "trend_growth": "",
              "related_keywords": ""
            },
            {
              "keywords": ["blender", "juice", "portable", "bottle"],
              "title": "📌 Wireless Portable USB Juicer Bottle",
              "platform": "Pinterest Trends Engine",
              "engagement": "1.4M Monthly Volume",
              "tag": "📌 Top Pinterest Niche",
              "color": "#bd081c",
