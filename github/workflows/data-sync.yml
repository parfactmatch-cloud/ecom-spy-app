name: EcomSpy Automated Data Sync

on:
  push:
    paths:
      - 'raw_data.json'
  workflow_dispatch: # Allows manual trigger from GitHub UI if needed

jobs:
  build-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Source
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Process Raw Ecom Catalog Data
        run: python scripts/process_data.py

      - name: Commit and Push Compiled Database
        run: |
          git config --global user.name "EcomSpy Data Bot"
          git config --global user.email "bot-sync@ecomspy.pro"
          git add data.json
          # Commit only if there are active differences to prevent workflow loop crashes
          git diff-index --quiet HEAD || git commit -m "⚙️ Database Auto-Sync: data.json compiled [Skip CI]"
          git push
          
