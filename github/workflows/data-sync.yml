name: EcomSpy Automated Data Sync

on:
  push:
    paths:
      - 'raw_data.json'
  schedule:
    - cron: '0 0 * * *' # Har 24 ghante me automatic chalega

jobs:
  build-and-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Dependencies
        run: pip install -r requirements.txt
      - name: Run Scraper & Processor
        run: python scripts/process_data.py
      - name: Commit changes
        run: |
          git config --global user.name "EcomSpy Bot"
          git config --global user.email "bot@ecomspy.pro"
          git add data.json
          git diff-index --quiet HEAD || git commit -m "⚙️ Auto-Scraped Data Sync"
          git push
          
